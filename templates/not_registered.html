<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Registered</title>
  <link rel="stylesheet" href="/static/ui/css/reset.css">
  <link rel="stylesheet" href="/static/ui/css/tokens.css">
  <link rel="stylesheet" href="/static/ui/css/typography.css">
  <link rel="stylesheet" href="/static/ui/css/components.css">
  <link rel="stylesheet" href="/static/ui/css/layout.css">
  <link rel="stylesheet" href="/static/ui/css/utilities.css">
  <style>
    body { background: var(--color-bg); min-height: 100dvh; display: flex; align-items: center; justify-content: center; }
    .not-registered { text-align: center; max-width: 400px; padding: var(--space-6); }
    .not-registered h1 { font-family: var(--font-display); font-size: var(--text-title); font-weight: 700; margin-block-end: var(--space-4); }
    .not-registered p { color: var(--color-text-secondary); margin-block-end: var(--space-6); }
  </style>
</head>
<body>
  <div class="not-registered">
    <h1>No Account</h1>
    <p>You're signed in but don't have an account yet. Ask the administrator for an invite link to get started.</p>
    <form action="/auth/logout" method="post">
      <button type="submit" class="btn btn--secondary">Sign Out</button>
    </form>
  </div>
</body>
</html>
