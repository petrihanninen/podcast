{% extends "base.html" %}
{% block title %}Sign in — Podcast{% endblock %}

{% block content %}
<div style="text-align: center; padding: var(--space-8);">
  <p id="login-status" style="color: var(--color-text-muted);">Signing in…</p>
</div>
{% endblock %}

{% block scripts %}
<script>
  const nextUrl = {{ next_url | tojson }};

  async function init() {
    const identity = window.Shoo?.getIdentity();

    if (identity && identity.token) {
      document.getElementById('login-status').textContent = 'Verifying…';
      try {
        const res = await fetch('/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: identity.token }),
        });
        if (res.ok) {
          window.location.href = nextUrl;
          return;
        }
        // Token rejected — show error instead of auto-retrying (which causes infinite loop)
        const data = await res.json().catch(() => ({}));
        const el = document.getElementById('login-status');
        el.style.color = 'var(--color-error, #e55)';
        el.innerHTML = 'Sign-in failed: ' + (data.error || 'Unknown error') +
          '.<br><a href="#" id="retry-signin" style="color: var(--color-accent-text);">Try again</a>';
        document.getElementById('retry-signin').addEventListener('click', function(e) {
          e.preventDefault();
          window.Shoo.clearIdentity();
          el.style.color = 'var(--color-text-muted)';
          el.textContent = 'Signing in…';
          var returnTo = '/auth/login?next=' + encodeURIComponent(nextUrl);
          window.Shoo.startSignIn({ returnTo: returnTo });
        });
        return;
      } catch (e) {
        // Network error — fall through to sign-in
      }
    }

    // No identity (or cleared) — start Shoo sign-in
    const returnTo = '/auth/login?next=' + encodeURIComponent(nextUrl);
    window.Shoo.startSignIn({ returnTo });
  }

  // Give shoo.js a moment to initialize
  if (window.Shoo) {
    init();
  } else {
    window.addEventListener('load', () => setTimeout(init, 100));
  }
</script>
{% endblock %}
