{% extends "base.html" %}
{% block title %}Settings — Podcast{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Settings</h1>
</div>

<form method="post" action="/settings" class="stack">
  <div class="form-group">
    <label for="title">Podcast Title</label>
    <input type="text" id="title" name="title" class="input" value="{{ settings.title }}">
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" class="textarea" rows="3">{{ settings.description }}</textarea>
  </div>

  <div class="form-group">
    <label for="author">Author</label>
    <input type="text" id="author" name="author" class="input" value="{{ settings.author }}">
  </div>

  <div class="form-group">
    <label for="language">Language</label>
    <input type="text" id="language" name="language" class="input" value="{{ settings.language }}" placeholder="en">
  </div>

  <hr class="divider">

  <div class="grid grid--2">
    <div class="form-group">
      <label for="host_a_name">Host A Name</label>
      <input type="text" id="host_a_name" name="host_a_name" class="input" value="{{ settings.host_a_name }}">
    </div>
    <div class="form-group">
      <label for="host_b_name">Host B Name</label>
      <input type="text" id="host_b_name" name="host_b_name" class="input" value="{{ settings.host_b_name }}">
    </div>
  </div>

  <div>
    <button type="submit" class="btn btn--primary">Save Settings</button>
  </div>
</form>

<hr class="divider">

<div class="card">
  <p class="card__title">RSS Feed</p>
  <p class="card__body">
    Subscribe to your podcast feed at:
    <code style="background: var(--color-bg-subtle); padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm); font-size: var(--text-caption);">
      {{ request.url_for('feed') }}
    </code>
  </p>
</div>
{% endblock %}
