<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invalid Invite</title>
  <link rel="stylesheet" href="/static/ui/css/reset.css">
  <link rel="stylesheet" href="/static/ui/css/tokens.css">
  <link rel="stylesheet" href="/static/ui/css/typography.css">
  <link rel="stylesheet" href="/static/ui/css/components.css">
  <link rel="stylesheet" href="/static/ui/css/layout.css">
  <link rel="stylesheet" href="/static/ui/css/utilities.css">
  <style>
    body { background: var(--color-bg); min-height: 100dvh; display: flex; align-items: center; justify-content: center; }
    .invalid-invite { text-align: center; max-width: 400px; padding: var(--space-6); }
    .invalid-invite h1 { font-family: var(--font-display); font-size: var(--text-title); font-weight: 700; margin-block-end: var(--space-4); }
    .invalid-invite p { color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div class="invalid-invite">
    <h1>Invalid Invite</h1>
    <p>This invite link is invalid or has expired. Please ask the administrator for a new one.</p>
  </div>
</body>
</html>
